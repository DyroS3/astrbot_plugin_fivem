<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" integrity="sha384-wcIxkf4k558AjM3Yz3BBFQUbk/zgIYC2R0QpeeYb+TwlBVMrlgLqwRjRtGZiK7ww" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script>hljs.highlightAll();</script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js" integrity="sha384-hIoBPJpTUs74ddyc4bFZSM1TVlQDA60VBbJS0oA934VSz82sBx1X7kSx2ATBDIyd" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js" integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous"
      onload="renderMathInElement(document.getElementById('content'),{delimiters: [{left: '$$', right: '$$', display: true},{left: '$', right: '$', display: false}]});"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .topbar {
      background: #f6f8fa;
      border-bottom: 1px solid #d1d9e0;
      padding: 16px 60px;
      font-size: 26px;
      color: #656d76;
    }
    .topbar-label { font-weight: 600; color: #1f2328; }
    .topbar-ver { margin-left: 6px; }
    .markdown-body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 38px;
      line-height: 1.7;
      box-sizing: border-box;
      width: 100%;
      padding: 48px 60px 36px;
    }
    .markdown-body h1 { font-size: 64px; letter-spacing: -0.02em; margin-bottom: 24px; }
    .markdown-body h2 { font-size: 48px; letter-spacing: -0.01em; margin-top: 36px; }
    .markdown-body table { font-size: 34px; }
    .markdown-body th, .markdown-body td { padding: 14px 24px; }
    .markdown-body blockquote { font-size: 34px; }
    .markdown-body code { font-size: 32px; }
    .markdown-body pre { font-size: 28px; }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-label"># AstrBot</span>
    <span class="topbar-ver">{{ version }}</span>
  </div>
  <article class="markdown-body" id="content"></article>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    document.getElementById('content').innerHTML = marked.parse(`{{ text | safe}}`);
  </script>
</body>
</html>
